<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Ollama Chat</title>
	<style>
		body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:850px;margin:40px auto;padding:0 16px;color:#171717}
		textarea{width:100%;height:90px;box-sizing:border-box}
		pre{white-space:pre-wrap;background:#f4f4f4;padding:12px;border-radius:8px;min-height:120px}
		select,input,textarea,button{font:inherit}
		select,input{padding:6px 8px}
		button{padding:7px 12px}
		.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
		.row select{min-width:220px}
		.status{margin:12px 0;color:#555}
		.error{margin:12px 0;padding:10px 12px;border:1px solid #d33;background:#fff3f3;color:#9a1111;border-radius:8px}
		.hidden{display:none}
	</style>
</head>
<body>
	<h1>Ollama Chat</h1>
	<div class="row">
		<select id="model"></select>
		<input id="custom-model" placeholder="custom model">
		<a href="/auth/logout">logout</a>
	</div>
	<div id="status" class="status">Loading models...</div>
	<div id="error" class="error hidden"></div>
	<pre id="log"></pre>
	<textarea id="msg" placeholder="Ask something..."></textarea><br>
	<button id="send" type="button">Send</button>

	<script>
		const messages = [];
		const log = document.getElementById('log');
		const model = document.getElementById('model');
		const customModel = document.getElementById('custom-model');
		const statusEl = document.getElementById('status');
		const errorEl = document.getElementById('error');
		const msg = document.getElementById('msg');
		const sendButton = document.getElementById('send');

		let defaultModel = 'llama3.2';

		function showError(message) {
			errorEl.textContent = message;
			errorEl.classList.remove('hidden');
		}

		function clearError() {
			errorEl.textContent = '';
			errorEl.classList.add('hidden');
		}

		function selectedModel() {
			return customModel.value.trim() || model.value || defaultModel;
		}

		async function fetchJSON(url, options) {
			const response = await fetch(url, options);
			const text = await response.text();
			let data = {};
			if (text) {
				try {
					data = JSON.parse(text);
				} catch {
					data = { error: text };
				}
			}
			if (!response.ok) {
				throw new Error(data.error || `${response.status} ${response.statusText}`);
			}
			return data;
		}

		async function loadConfig() {
			const cfg = await fetchJSON('/api/config');
			defaultModel = cfg.defaultModel || defaultModel;
		}

		async function loadModels() {
			await loadConfig();
			const data = await fetchJSON('/api/models');
			model.replaceChildren();

			const names = (data.models || []).map((m) => m.name).filter(Boolean);
			if (!names.includes(defaultModel)) {
				names.unshift(defaultModel);
			}

			for (const name of names) {
				const option = document.createElement('option');
				option.value = name;
				option.textContent = name;
				option.selected = name === defaultModel;
				model.append(option);
			}

			statusEl.textContent = names.length === 1
				? `Configured model: ${names[0]}`
				: `Configured models: ${names.join(', ')}`;
		}

		async function send() {
			clearError();
			const content = msg.value.trim();
			if (!content) {
				return;
			}

			const currentModel = selectedModel();
			messages.push({ role: 'user', content });
			log.textContent += `\nYou: ${content}\n`;
			msg.value = '';
			sendButton.disabled = true;

			try {
				const reply = await fetchJSON('/api/chat', {
					method: 'POST',
					headers: { 'content-type': 'application/json' },
					body: JSON.stringify({ model: currentModel, messages }),
				});
				messages.push(reply.message);
				log.textContent += `\nAI (${currentModel}): ${reply.message.content}\n`;
			} catch (err) {
				showError(err.message);
				log.textContent += `\nError: ${err.message}\n`;
			} finally {
				sendButton.disabled = false;
				msg.focus();
			}
		}

		sendButton.addEventListener('click', send);
		msg.addEventListener('keydown', (event) => {
			if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
				send();
			}
		});

		loadModels().catch((err) => {
			model.replaceChildren();
			const option = document.createElement('option');
			option.value = defaultModel;
			option.textContent = defaultModel;
			model.append(option);
			statusEl.textContent = `Configured model: ${defaultModel}`;
			showError(`Could not load models: ${err.message}`);
		});
	</script>
</body>
</html>
