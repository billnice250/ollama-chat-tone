<!doctype html><html><head><meta charset="utf-8"><title>Ollama Chat</title><style>body{font-family:system-ui;max-width:850px;margin:40px auto;padding:0 16px}textarea{width:100%;height:90px}pre{white-space:pre-wrap;background:#f4f4f4;padding:12px;border-radius:8px}.row{display:flex;gap:8px}</style></head><body>
<h1>Ollama Chat</h1><div class="row"><input id="model" value="llama3.2"><a href="/auth/logout">logout</a></div>
<pre id="log"></pre><textarea id="msg" placeholder="Ask something..."></textarea><br><button onclick="send()">Send</button>
<script>
const messages=[]; const log=document.getElementById('log');
async function send(){const content=document.getElementById('msg').value.trim(); if(!content)return; messages.push({role:'user',content}); log.textContent += '\nYou: '+content+'\n'; document.getElementById('msg').value='';
 const r=await fetch('/api/chat',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({model:document.getElementById('model').value,messages})});
 const j=await r.json(); messages.push(j.message); log.textContent += '\nAI: '+j.message.content+'\n';}
</script></body></html>
