<!doctype html>
<html lang="en" data-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Admin</title>
	<link rel="icon" href="/logo.svg" type="image/svg+xml">
	<link rel="stylesheet" href="/styles.css">
</head>
<body>
	<main class="admin-page">
		<header class="admin-header">
			<div class="admin-heading">
				<h1 id="admin-title">Admin</h1>
				<p id="admin-status">Loading...</p>
			</div>
			<nav class="admin-nav">
				<a href="/">Chat</a>
				<button class="secondary-button theme-toggle" type="button" aria-label="Toggle dark mode">Theme</button>
				<a href="/auth/logout">Logout</a>
			</nav>
		</header>

		<section class="admin-panel">
			<h2>Users</h2>
			<div id="admin-error" class="error hidden"></div>
			<div id="users-list" class="users-list"></div>
		</section>

		<section class="admin-panel" id="ollama-settings-panel">
			<div class="panel-header">
				<div>
					<h2>Ollama Settings</h2>
					<p class="panel-copy">Manage the Ollama endpoint, long-generation timeout, and optional mTLS client certificate.</p>
				</div>
				<div class="panel-actions">
					<button id="reload-config" class="secondary-button" type="button">Reload config</button>
				</div>
			</div>
			<div id="settings-error" class="error hidden"></div>
			<div id="settings-status" class="success hidden"></div>
			<form id="ollama-settings-form" class="settings-form">
				<div class="settings-grid">
					<label class="field-group" for="ollama-url">
						<span>Ollama URL</span>
						<input id="ollama-url" name="ollamaURL" type="url" inputmode="url" placeholder="http://ollama:11434" autocomplete="url" spellcheck="false">
					</label>

					<label class="field-group" for="ollama-timeout">
						<span>Timeout</span>
						<input id="ollama-timeout" name="ollamaTimeout" type="text" placeholder="e.g. 10m or 0" spellcheck="false">
					</label>

					<label class="field-group" for="default-model">
						<span>Default Model</span>
						<input id="default-model" name="defaultModel" type="text" placeholder="e.g. llama3.2" autocapitalize="off" spellcheck="false">
					</label>
				</div>
				<p class="field-help">Use <code>0</code> to disable the client-side request deadline for very long generations.</p>
				<div class="form-actions">
					<button id="save-settings-btn" class="auth-button" type="submit">Save Settings</button>
				</div>
			</form>

			<section class="settings-subpanel">
				<h3>mTLS Certificate (PFX)</h3>
				<p id="mtls-status" class="panel-copy"></p>
				<form id="cert-upload-form" class="settings-form" enctype="multipart/form-data">
					<div class="settings-grid">
						<label class="field-group" for="cert-file">
							<span>PFX / P12 file</span>
							<input id="cert-file" name="cert" type="file" accept=".pfx,.p12">
						</label>

						<label class="field-group" for="cert-pass">
							<span>Passphrase (if any)</span>
							<input id="cert-pass" name="passphrase" type="password" placeholder="Leave blank if none" autocomplete="new-password">
						</label>
					</div>
					<div class="form-actions form-actions-split">
						<button id="upload-cert-btn" class="auth-button" type="submit">Upload Certificate</button>
						<button id="remove-cert-btn" class="secondary-button" type="button">Remove Certificate</button>
					</div>
				</form>
			</section>
		</section>
	</main>

	<script src="/theme.js"></script>
	<script src="/admin.js"></script>
</body>
</html>
