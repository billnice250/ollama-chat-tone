<!doctype html>
<html lang="en" data-theme="dark">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Ollama Chat Tone</title>
	<meta name="theme-color" content="#070b13">
	<link rel="manifest" href="/manifest.webmanifest">
	<link rel="icon" href="/logo.svg" type="image/svg+xml">
	<link rel="stylesheet" href="/styles.css">
</head>

<body>
	<div class="app">
		<aside class="sidebar">
			<div class="brand">
				<h1 id="app-name">Ollama Chat Tone</h1>
				<p id="app-status">Loading models...</p>
				<p id="current-user" class="current-user">anonymous</p>
				<p id="app-version" class="app-version">Version dev</p>
			</div>

			<button id="new-chat" class="new-chat" type="button">New chat</button>
			<div id="chat-list" class="chat-list"></div>
			<div class="sidebar-actions" aria-label="App actions">
				<button id="refresh-models" class="secondary-button" type="button">Refresh models</button>
				<button class="secondary-button theme-toggle" type="button" aria-label="Toggle dark mode">Theme</button>
				<a id="admin-link" class="sidebar-action-link hidden" href="/admin.html">Admin</a>
				<a class="sidebar-action-link" href="/auth/logout">Logout</a>
			</div>
			<nav class="sidebar-links" aria-label="External links">
				<a href="https://blog.billnice.it/#contact" target="_blank" rel="noopener noreferrer">Contact
					Developer</a>
				<button id="delete-account" class="account-delete hidden" type="button">Delete account</button>
			</nav>
		</aside>
		<button id="menu-backdrop" class="menu-backdrop" type="button" aria-label="Close menu"></button>

		<main class="main">
			<header class="topbar">
				<div class="title">
					<button id="sidebar-toggle" class="sidebar-toggle" type="button"
						aria-expanded="false">Chats</button>
					<h2 id="chat-title">New chat</h2>
					<p id="chat-meta">No messages yet</p>
				</div>
			</header>

			<div class="messages-wrap">
				<section id="messages" class="messages" aria-live="polite"></section>
				<button id="jump-bottom" class="jump-bottom hidden" type="button" aria-label="Jump to latest message">Bottom</button>
			</div>
			<div id="error" class="error hidden"></div>

			<form id="composer" class="composer">
				<div class="composer-inner">
					<div class="prompt-box">
						<textarea id="prompt" placeholder="Ask something..."></textarea>
						<label class="think-toggle">
							<input id="think-toggle" type="checkbox">
							<span>Reasoning</span>
						</label>
					</div>
					<div class="composer-controls">
						<select id="model" aria-label="Model"></select>
					</div>
					<button id="send" class="send" type="submit">Send</button>
				</div>
				<div class="footer-note">Press Cmd+Enter or Ctrl+Enter to send.</div>
			</form>
		</main>
	</div>

	<div id="delete-account-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="delete-account-title">
		<div class="modal-panel">
			<h2 id="delete-account-title">Delete account</h2>
			<p>This permanently deletes your account, conversations, and messages.</p>
			<p class="modal-warning">This cannot be undone.</p>
			<div class="modal-actions">
				<button id="cancel-delete-account" class="secondary-button" type="button">Cancel</button>
				<button id="confirm-delete-account" class="danger-button" type="button">Delete account</button>
			</div>
		</div>
	</div>

	<script src="/theme.js"></script>
	<script src="/app.js"></script>
	<script src="/pwa.js"></script>
</body>

</html>
