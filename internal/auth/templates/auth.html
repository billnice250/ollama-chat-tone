<!doctype html>
<html lang="en" data-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>{{.Title}}</title>
	<link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-page">
	<main class="auth-box">
		<p class="auth-brand">{{.AppName}}</p>
		<h1 class="auth-title">{{.Title}}</h1>
		<p class="auth-copy">Use your account to access {{.AppName}}.</p>

		{{if .Message}}<p class="auth-message">{{.Message}}</p>{{end}}

		{{if .ShowOAuth}}
			<a class="auth-button oauth" href="{{.OAuthHref}}">{{.OAuthLabel}}</a>
		{{end}}

		{{if and .ShowOAuth .ShowLocal}}<div class="auth-divider">or</div>{{end}}

		{{if .ShowLocal}}
			<form class="auth-form" method="post" action="{{.Action}}">
				<label for="username">Username</label>
				<input id="username" name="username" placeholder="Username" autocomplete="username" required autofocus>

				<label for="password">Password</label>
				<input id="password" name="password" type="password" placeholder="Password" autocomplete="{{.PasswordAutocomplete}}" required>

				<button class="auth-button" type="submit">{{.Title}}</button>
			</form>
			<p class="auth-alt"><a href="{{.AltHref}}">{{.AltText}}</a></p>
		{{end}}
	</main>
</body>
</html>
