<!doctype html>
<html lang="en" data-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>{{.Title}}</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #070b13;
			--surface: #0b1019;
			--muted: #9ca3af;
			--text: #e5e7eb;
			--line: #1f2937;
			--accent: #818cf8;
			--accent-strong: #a78bfa;
			--danger: #f87171;
			--danger-soft: #2a1117;
		}

		* {
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			display: grid;
			place-items: center;
			margin: 0;
			padding: 24px;
			background: radial-gradient(circle at 50% 35%, rgba(129, 140, 248, .12), transparent 34%), var(--bg);
			color: var(--text);
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		.box {
			width: min(420px, 92vw);
			padding: 24px;
			border: 1px solid var(--line);
			border-radius: 8px;
			background: rgba(11, 16, 25, .94);
			box-shadow: 0 20px 60px rgba(0, 0, 0, .45);
		}

		.brand {
			margin: 0 0 8px;
			color: var(--accent-strong);
			font: 700 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
		}

		h1 {
			margin: 0;
			font-size: 28px;
			line-height: 1.15;
		}

		p {
			margin: 8px 0 16px;
			color: var(--muted);
			line-height: 1.45;
		}

		.message {
			padding: 10px 12px;
			border: 1px solid var(--danger);
			border-radius: 8px;
			background: var(--danger-soft);
			color: var(--danger);
		}

		label {
			display: block;
			margin: 14px 0 6px;
			color: var(--muted);
			font-size: 13px;
			font-weight: 700;
		}

		input,
		button,
		.button {
			width: 100%;
			height: 42px;
			font: inherit;
		}

		input {
			padding: 0 12px;
			border: 1px solid var(--line);
			border-radius: 8px;
			background: #111827;
			color: var(--text);
		}

		input::placeholder {
			color: var(--muted);
		}

		input:focus {
			outline: 2px solid rgba(129, 140, 248, .38);
			outline-offset: 2px;
		}

		button,
		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			border: 0;
			border-radius: 8px;
			background: linear-gradient(135deg, var(--accent), var(--accent-strong));
			color: #f8fafc;
			font-weight: 750;
			text-decoration: none;
			cursor: pointer;
		}

		button {
			margin-top: 16px;
		}

		.oauth {
			margin-top: 16px;
		}

		.divider {
			display: flex;
			align-items: center;
			gap: 10px;
			margin: 18px 0 2px;
			color: var(--muted);
			font-size: 12px;
			text-transform: uppercase;
			letter-spacing: .08em;
		}

		.divider::before,
		.divider::after {
			content: "";
			flex: 1;
			height: 1px;
			background: var(--line);
		}

		.alt {
			margin: 16px 0 0;
			text-align: center;
		}

		.alt a {
			color: var(--accent-strong);
			font-weight: 700;
			text-decoration: none;
		}

		.alt a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<main class="box">
		<p class="brand">{{.AppName}}</p>
		<h1>{{.Title}}</h1>
		<p>Use your account to access {{.AppName}}.</p>

		{{if .Message}}<p class="message">{{.Message}}</p>{{end}}

		{{if .ShowOAuth}}
			<a class="button oauth" href="{{.OAuthHref}}">{{.OAuthLabel}}</a>
		{{end}}

		{{if and .ShowOAuth .ShowLocal}}<div class="divider">or</div>{{end}}

		{{if .ShowLocal}}
			<form method="post" action="{{.Action}}">
				<label for="username">Username</label>
				<input id="username" name="username" placeholder="Username" autocomplete="username" required autofocus>

				<label for="password">Password</label>
				<input id="password" name="password" type="password" placeholder="Password" autocomplete="{{.PasswordAutocomplete}}" required>

				<button type="submit">{{.Title}}</button>
			</form>
			<p class="alt"><a href="{{.AltHref}}">{{.AltText}}</a></p>
		{{end}}
	</main>
</body>
</html>
