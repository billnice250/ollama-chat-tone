<!doctype html>
<html lang="en" data-theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Logged out</title>
	<style>
		:root {
			color-scheme: dark;
			--bg: #070b13;
			--surface: #0b1019;
			--muted: #9ca3af;
			--text: #e5e7eb;
			--line: #1f2937;
			--accent: #818cf8;
			--accent-strong: #a78bfa;
		}

		* {
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			display: grid;
			place-items: center;
			margin: 0;
			padding: 24px;
			background: radial-gradient(circle at 50% 35%, rgba(129, 140, 248, .12), transparent 34%), var(--bg);
			color: var(--text);
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
		}

		.box {
			width: min(420px, 92vw);
			padding: 24px;
			border: 1px solid var(--line);
			border-radius: 8px;
			background: rgba(11, 16, 25, .94);
			box-shadow: 0 20px 60px rgba(0, 0, 0, .45);
			text-align: center;
		}

		.brand {
			margin: 0 0 8px;
			color: var(--accent-strong);
			font: 700 15px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
		}

		h1 {
			margin: 0;
			font-size: 28px;
			line-height: 1.15;
		}

		p {
			margin: 8px 0 20px;
			color: var(--muted);
			line-height: 1.45;
		}

		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 100%;
			height: 42px;
			border-radius: 8px;
			background: linear-gradient(135deg, var(--accent), var(--accent-strong));
			color: #f8fafc;
			font-weight: 750;
			text-decoration: none;
		}
	</style>
</head>
<body>
	<main class="box">
		<p class="brand">{{.AppName}}</p>
		<h1>Logged out</h1>
		<p>You are logged out of {{.AppName}}.</p>
		<a class="button" href="/auth/login">Log in again</a>
	</main>
</body>
</html>
